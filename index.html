<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #151e2a;
            border-radius: 24px;
            padding: 30px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 1px solid #2a3a4a;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #7aa9ff, #b47aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3a4a;
            padding-bottom: 12px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 24px;
            border-radius: 30px;
            background: #1f2b38;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .tab.active {
            background: linear-gradient(135deg, #3a7bd5, #7a4bff);
            color: white;
        }
        .tab:hover {
            transform: scale(1.02);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .sub {
            color: #8a9bb5;
            font-size: 14px;
            margin-bottom: 25px;
            border-left: 3px solid #3b5a7a;
            padding-left: 16px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .input-group input {
            flex: 1;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            background: #1f2b38;
            color: #fff;
            font-size: 16px;
            outline: 1px solid #2e4155;
        }
        .input-group input:focus {
            outline: 2px solid #5a8cff;
        }
        .input-group button {
            padding: 14px 38px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #3a7bd5, #7a4bff);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-group button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(60, 100, 255, 0.5);
        }
        #loader {
            display: none;
            text-align: center;
            padding: 20px 0;
            font-size: 18px;
            color: #7aa9ff;
        }
        #loader.show {
            display: block;
        }
        .result-card {
            background: #101a26;
            border-radius: 18px;
            padding: 20px 24px;
            margin-top: 10px;
            border: 1px solid #263544;
            display: none;
        }
        .result-card.visible {
            display: block;
        }
        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin-top: 22px;
            margin-bottom: 12px;
            color: #b6ccff;
            border-bottom: 1px solid #2a3f54;
            padding-bottom: 6px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            background: #0d1520;
            padding: 14px 18px;
            border-radius: 14px;
        }
        .grid-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1e2d3d;
        }
        .grid-item .label {
            color: #8da0c0;
        }
        .grid-item .value {
            font-weight: 500;
            color: #d6e4ff;
            text-align: right;
            word-break: break-all;
            max-width: 60%;
        }
        .error-msg {
            color: #ff7a7a;
            background: #2a1a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #ff4a4a;
        }
        .warning-msg {
            color: #ffcc66;
            background: #2a2a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #ffaa00;
            margin-top: 10px;
        }
        .success-msg {
            color: #66ff88;
            background: #1a2a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #00ff44;
            margin-top: 10px;
        }
        .domain-tag {
            background: #1b2a3c;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #b8d0f0;
            display: inline-block;
            margin: 3px 4px 3px 0;
        }
        #rawJson {
            background: #0a111c;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 260px;
            overflow: auto;
            color: #b0c8e0;
            border: 1px solid #223544;
            margin-top: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 13px;
            color: #5a7088;
            text-align: center;
            border-top: 1px solid #1d2c3d;
            padding-top: 18px;
        }
        .link-btn {
            display: inline-block;
            background: #1f3349;
            padding: 6px 18px;
            border-radius: 30px;
            color: #7aa9ff;
            text-decoration: none;
            margin: 4px 6px 4px 0;
            font-size: 14px;
        }
        .link-btn:hover {
            background: #2a405a;
        }
        .found-name {
            background: #1a2a1a;
            border-left: 3px solid #66ff88;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 6px;
            font-size: 16px;
        }
        .provider-location {
            background: #1a2a3a;
            border-left: 3px solid #7aa9ff;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 6px;
            font-size: 15px;
        }
        @media (max-width: 700px) {
            .container { padding: 18px; }
            .grid-2col { grid-template-columns: 1fr; }
            .input-group input { min-width: 140px; }
        }
    </style>
</head>

    // ---- ПОИСК ПРОВАЙДЕРА В БАЗЕ ----
    function findProviderLocation(org, geoCity, geoCountry) {
        // 1. Ищем точное совпадение
        if (PROVIDER_DB[org]) {
            return PROVIDER_DB[org];
        }

        // 2. Ищем частичное совпадение
        for (let key in PROVIDER_DB) {
            if (org.includes(key) || key.includes(org)) {
                return PROVIDER_DB[key];
            }
        }

        // 3. Ищем по ключевым словам
        const keywords = org.split(' ').filter(w => w.length > 3);
        for (let kw of keywords) {
            for (let key in PROVIDER_DB) {
                if (key.includes(kw) || kw.includes(key)) {
                    return PROVIDER_DB[key];
                }
            }
        }

        // 4. Если не нашли — используем геолокацию по IP
        if (geoCity && geoCity !== 'N/A') {
            return {
                city: geoCity,
                region: geoCountry || 'Неизвестно',
                country: geoCountry || 'Неизвестно',
                lat: 'N/A',
                lon: 'N/A'
            };
        }

        return null;
    }

    // ---- ЭЛЕМЕНТЫ ----
    const ipInput = document.getElementById('ipInput');
    const ipAnalyzeBtn = document.getElementById('ipAnalyzeBtn');
    const phoneInput = document.getElementById('phoneInput');
    const phoneAnalyzeBtn = document.getElementById('phoneAnalyzeBtn');
    const loader = document.getElementById('loader');
    const resultContainer = document.getElementById('resultContainer');

    // ---- ВКЛАДКИ ----
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab).classList.add('active');
        });
    });

    function showLoader() { loader.classList.add('show'); }
    function hideLoader() { loader.classList.remove('show'); }
    function showResult(html) {
        resultContainer.innerHTML = html;
        resultContainer.classList.add('visible');
    }
    function showError(message) {
        showResult(`<div class="error-msg">❌ ${message}</div>`);
    }

    // ================================================================
    // 1. АНАЛИЗ IP (С ПОИСКОМ ПО ПРОВАЙДЕРУ)
    // ================================================================
    async function analyzeIP(ip) {
        console.log('🔍 Анализ IP:', ip);
        showLoader();
        resultContainer.classList.remove('visible');

        try {
            // ----- 1. ГЕОЛОКАЦИЯ -----
            const geoResp = await fetch(`https://ipinfo.io/${ip}/json`);
            if (!geoResp.ok) throw new Error('Не удалось получить геоданные');
            const geo = await geoResp.json();
            console.log('🌍 Гео:', geo);

            // ----- 2. ПОИСК МЕСТОПОЛОЖЕНИЯ ПО ПРОВАЙДЕРУ -----
            const providerOrg = geo.org || '';
            const providerLocation = findProviderLocation(providerOrg, geo.city, geo.country);
            console.log('📍 Провайдер:', providerOrg);
            console.log('📍 Местоположение провайдера:', providerLocation);

            // ----- 3. ПОИСК ИМЕНИ И ФАМИЛИИ -----
            let nameData = { name: 'Не найдено', surname: 'Не найдено', source: [] };

            if (geo.org) {
                const orgParts = geo.org.split(' ');
                const common = ['LLC', 'LTD', 'INC', 'CORP', 'CO', 'ltd', 'inc', 'corp', 'AS', 'SIA', 'OOO', 'ООО', 'ГБУ', 'ГУП', 'МУП', 'ФГУП', 'FOR', 'UNITY'];
                const filtered = orgParts.filter(p => !common.includes(p.toUpperCase()));
                if (filtered.length > 0) {
                    nameData.name = filtered[0];
                    if (filtered.length > 1) nameData.surname = filtered.slice(1).join(' ');
                    nameData.source.push('провайдер');
                }
            }

            try {
                const rtResp = await fetch(`https://api.hackertarget.com/reverseiplookup/?q=${ip}`);
                const rtText = await rtResp.text();
                if (rtText && !rtText.includes('error') && !rtText.includes('No DNS')) {
                    const domains = rtText.split('\n').filter(d => d.trim() !== '').slice(0, 10);
                    for (let domain of domains) {
                        const parts = domain.replace(/\.(ru|com|org|net|info|xyz|ua|by|kz)$/, '').split(/[-_.]/);
                        for (let part of parts) {
                            if (part.length > 2 && part.match(/^[a-zA-Zа-яА-Я]/) && !part.match(/^www$/i) && !part.match(/^mail$/i)) {
                                if (nameData.name === 'Не найдено') {
                                    nameData.name = part.charAt(0).toUpperCase() + part.slice(1);
                                    nameData.source.push('домен');
                                }
                            }
                        }
                    }
                }
            } catch (e) {}

            // ----- 4. ФОРМИРУЕМ ОТВЕТ -----
            let html = '';

            // Информация о провайдере и его местоположении
            html += `<div class="section-title">🏢 Провайдер</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Название</span><span class="value">${geo.org || 'N/A'}</span></div>`;
            if (providerLocation) {
                html += `<div class="grid-item"><span class="label">Город</span><span class="value">${providerLocation.city}</span></div>`;
                html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${providerLocation.region}</span></div>`;
                html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${providerLocation.country}</span></div>`;
                if (providerLocation.lat !== 'N/A') {
                    html += `<div class="grid-item"><span class="label">Координаты</span><span class="value">${providerLocation.lat}, ${providerLocation.lon}</span></div>`;
                }
            } else {
                html += `<div class="grid-item" style="grid-column:1/-1;">
                    <span class="label" style="color:#ffcc66;">⚠️ Провайдер не найден в базе</span>
                    <span class="value" style="font-weight:300;font-size:13px;color:#8aa0c0;">Используется геолокация по IP</span>
                </div>`;
            }
            html += `</div>`;

            // Владелец
            html += `<div class="section-title">👤 Владелец (по IP)</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Имя</span><span class="value">${nameData.name}</span></div>`;
            html += `<div class="grid-item"><span class="label">Фамилия</span><span class="value">${nameData.surname}</span></div>`;
            if (nameData.source.length > 0) {
                html += `<div class="grid-item" style="grid-column:1/-1;border-bottom:none;">
                    <span class="label">Источник</span>
                    <span class="value" style="font-weight:300;font-size:13px;color:#8aa0c0;">${nameData.source.join(', ')}</span>
                </div>`;
            }
            html += `</div>`;

            // Геолокация (по IP)
            html += `<div class="section-title">📍 Геолокация (по IP)</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Город</span><span class="value">${geo.city || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${geo.region || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${geo.country || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Координаты</span><span class="value">${geo.loc || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Часовой пояс</span><span class="value">${geo.timezone || 'N/A'}</span></div>`;
            html += `</div>`;

            html += `<div class="section-title">📦 Сырые данные (JSON)</div>`;
            html += `<div id="rawJson">${JSON.stringify({ geo, providerLocation, name: nameData }, null, 2)}</div>`;

            showResult(html);

        } catch (error) {
            showError(`Ошибка: ${error.message}`);
        } finally {
            hideLoader();
        }
    }

    // ================================================================
    // 2. АНАЛИЗ ТЕЛЕФОНА
    // ================================================================
