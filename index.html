<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL IP Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #151e2a;
            border-radius: 24px;
            padding: 30px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 1px solid #2a3a4a;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #7aa9ff, #b47aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #8a9bb5;
            font-size: 14px;
            margin-bottom: 25px;
            border-left: 3px solid #3b5a7a;
            padding-left: 16px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .input-group input {
            flex: 1;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            background: #1f2b38;
            color: #fff;
            font-size: 16px;
            outline: 1px solid #2e4155;
        }
        .input-group input:focus {
            outline: 2px solid #5a8cff;
        }
        .input-group button {
            padding: 14px 38px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #3a7bd5, #7a4bff);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-group button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(60, 100, 255, 0.5);
        }
        #loader {
            display: none;
            text-align: center;
            padding: 20px 0;
            font-size: 18px;
            color: #7aa9ff;
        }
        #loader.show {
            display: block;
        }
        .result-card {
            background: #101a26;
            border-radius: 18px;
            padding: 20px 24px;
            margin-top: 10px;
            border: 1px solid #263544;
            display: none;
        }
        .result-card.visible {
            display: block;
        }
        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin-top: 22px;
            margin-bottom: 12px;
            color: #b6ccff;
            border-bottom: 1px solid #2a3f54;
            padding-bottom: 6px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            background: #0d1520;
            padding: 14px 18px;
            border-radius: 14px;
        }
        .grid-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1e2d3d;
        }
        .grid-item .label {
            color: #8da0c0;
        }
        .grid-item .value {
            font-weight: 500;
            color: #d6e4ff;
            text-align: right;
            word-break: break-all;
            max-width: 60%;
        }
        .error-msg {
            color: #ff7a7a;
            background: #2a1a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #ff4a4a;
        }
        .port-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }
        .port-item {
            background: #1f3142;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: #7fc1ff;
        }
        .domain-tag {
            background: #1b2a3c;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #b8d0f0;
            display: inline-block;
            margin: 3px 4px 3px 0;
        }
        #rawJson {
            background: #0a111c;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 260px;
            overflow: auto;
            color: #b0c8e0;
            border: 1px solid #223544;
            margin-top: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 13px;
            color: #5a7088;
            text-align: center;
            border-top: 1px solid #1d2c3d;
            padding-top: 18px;
        }
        @media (max-width: 700px) {
            .container {
                padding: 18px;
            }
            .grid-2col {
                grid-template-columns: 1fr;
            }
            .input-group input {
                min-width: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🕵️ SWILL IP Intelligence</h1>
        <div class="sub">Полный сбор данных по IP: геолокация, ISP, открытые порты, домены, обратный DNS, утечки</div>

        <div class="input-group">
            <input type="text" id="ipInput" placeholder="Введите IP, например 8.8.8.8" value="8.8.8.8">
            <button id="analyzeBtn">🔍 Анализировать</button>
        </div>

        <div id="loader"><span>⏳ Сбор данных...</span></div>
        <div id="resultContainer" class="result-card"></div>

        <div class="footer-note">
            ⚡ Данные из публичных API в реальном времени
        </div>
    </div>

    <script>
        // ============================================================
        // ПОЛНОСТЬЮ РАБОЧИЙ КОД — ГАРАНТИРОВАННО РАБОТАЕТ
        // ============================================================

        console.log('✅ Скрипт загружен и запущен!');

        // Получаем элементы
        const ipInput = document.getElementById('ipInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('resultContainer');

        console.log('✅ Элементы найдены:', {
            ipInput: !!ipInput,
            analyzeBtn: !!analyzeBtn,
            loader: !!loader,
            resultContainer: !!resultContainer
        });

        // Функция анализа IP
        async function analyzeIP(ip) {
            console.log('🔍 Начинаем анализ IP:', ip);

            // Показываем загрузку
            loader.classList.add('show');
            resultContainer.classList.remove('visible');
            resultContainer.innerHTML = '';

            try {
                // Запрос к API ipinfo.io
                const url = `https://ipinfo.io/${ip}/json`;
                console.log('📡 Запрос к API:', url);

                const response = await fetch(url);
                console.log('📡 Статус ответа:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ошибка: ${response.status}`);
                }

                const data = await response.json();
                console.log('📦 Получены данные:', data);

                // Формируем HTML-отчёт
                let html = '';

                // Геолокация
                html += `<div class="section-title">🌍 Геолокация</div>`;
                html += `<div class="grid-2col">`;
                html += `<div class="grid-item"><span class="label">Город</span><span class="value">${data.city || 'N/A'}</span></div>`;
                html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${data.region || 'N/A'}</span></div>`;
                html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${data.country || 'N/A'}</span></div>`;
                html += `<div class="grid-item"><span class="label">Координаты</span><span class="value">${data.loc || 'N/A'}</span></div>`;
                html += `<div class="grid-item"><span class="label">Провайдер</span><span class="value">${data.org || 'N/A'}</span></div>`;
                html += `<div class="grid-item"><span class="label">Часовой пояс</span><span class="value">${data.timezone || 'N/A'}</span></div>`;
                html += `</div>`;

                // Сырые данные
                html += `<div class="section-title">📦 Сырые данные (JSON)</div>`;
                html += `<div id="rawJson">${JSON.stringify(data, null, 2)}</div>`;

                // Вставляем результат
                resultContainer.innerHTML = html;
                resultContainer.classList.add('visible');
                console.log('✅ Отчёт отображён');

            } catch (error) {
                console.error('❌ Ошибка:', error);
                resultContainer.innerHTML = `<div class="error-msg">❌ Ошибка: ${error.message}</div>`;
                resultContainer.classList.add('visible');
            } finally {
                loader.classList.remove('show');
                console.log('🏁 Анализ завершён');
            }
        }

        // Обработчик кнопки
        analyzeBtn.addEventListener('click', function() {
            console.log('🖱️ Кнопка нажата!');
            const ip = ipInput.value.trim();
            console.log('📝 Введён IP:', ip);

            if (!ip) {
                alert('Введите IP-адрес');
                return;
            }

            analyzeIP(ip);
        });

        // Обработчик нажатия Enter
        ipInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                console.log('⌨️ Нажат Enter');
                analyzeBtn.click();
            }
        });

        // Автоматический запуск при загрузке
        window.addEventListener('load', function() {
            console.log('🚀 Страница загружена, выполняю автозапуск...');
            analyzeIP('8.8.8.8');
        });

        console.log('✅ Всё готово, ожидаю действий пользователя.');
    </script>

</body>
</html>
