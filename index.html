<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL OSINT — Проверенные данные</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; font-family: 'Segoe UI', sans-serif; color: #e0e6f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 1100px; width: 100%; background: #151e2a; border-radius: 24px; padding: 30px 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); border: 1px solid #2a3a4a; }
        h1 { font-size: 28px; background: linear-gradient(135deg, #7aa9ff, #b47aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
        .sub { color: #8a9bb5; font-size: 14px; margin-bottom: 20px; border-left: 3px solid #3b5a7a; padding-left: 16px; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid #2a3a4a; padding-bottom: 12px; }
        .tab { padding: 8px 24px; border-radius: 30px; background: #1f2b38; cursor: pointer; transition: 0.2s; font-weight: 500; user-select: none; }
        .tab.active { background: linear-gradient(135deg, #3a7bd5, #7a4bff); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .input-group input { flex: 1; min-width: 160px; padding: 14px 20px; border-radius: 40px; border: none; background: #1f2b38; color: #fff; font-size: 16px; outline: 1px solid #2e4155; }
        .input-group input:focus { outline: 2px solid #5a8cff; }
        .input-group button { padding: 14px 28px; border-radius: 40px; border: none; background: linear-gradient(135deg, #3a7bd5, #7a4bff); color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .input-group button:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(60, 100, 255, 0.5); }
        #loader { display: none; text-align: center; padding: 20px 0; font-size: 18px; color: #7aa9ff; }
        #loader.show { display: block; }
        .result-card { background: #101a26; border-radius: 18px; padding: 20px 24px; margin-top: 10px; border: 1px solid #263544; display: none; }
        .result-card.visible { display: block; }
        .section-title { font-size: 18px; font-weight: 500; margin-top: 22px; margin-bottom: 12px; color: #b6ccff; border-bottom: 1px solid #2a3f54; padding-bottom: 6px; }
        .section-title:first-of-type { margin-top: 0; }
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; background: #0d1520; padding: 14px 18px; border-radius: 14px; }
        .grid-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e2d3d; }
        .grid-item .label { color: #8da0c0; }
        .grid-item .value { font-weight: 500; color: #d6e4ff; text-align: right; word-break: break-all; max-width: 60%; }
        .warning-msg { color: #ffcc66; background: #2a2a1a; padding: 14px; border-radius: 14px; border-left: 4px solid #ffaa00; margin-top: 10px; }
        .link-btn { display: inline-block; background: #1f3349; padding: 6px 18px; border-radius: 30px; color: #7aa9ff; text-decoration: none; margin: 4px 6px 4px 0; font-size: 14px; }
        .link-btn:hover { background: #2a405a; }
        #rawJson { background: #0a111c; padding: 14px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 13px; max-height: 260px; overflow: auto; color: #b0c8e0; border: 1px solid #223544; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
        .footer-note { margin-top: 25px; font-size: 13px; color: #5a7088; text-align: center; border-top: 1px solid #1d2c3d; padding-top: 18px; }
        .map-container { margin-top: 12px; border-radius: 14px; overflow: hidden; border: 1px solid #263544; }
        .map-container iframe { width: 100%; height: 300px; border: none; display: block; }
        .info-box { background: #0d1520; padding: 14px 18px; border-radius: 14px; border-left: 3px solid #ffcc66; margin-top: 10px; }
        .info-box .label { color: #8da0c0; }
        .info-box .value { color: #d6e4ff; }
        @media (max-width: 700px) { .container { padding: 18px; } .grid-2col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🕵️ SWILL OSINT</h1>
    <div class="sub">Геопозиция по IP + поиск людей (только проверенные данные)</div>

    <div class="tabs">
        <div class="tab active" data-tab="ip-tab">🌐 IP → Геопозиция</div>
        <div class="tab" data-tab="search-tab">🔍 Поиск людей</div>
    </div>

    <div id="ip-tab" class="tab-content active">
        <div class="input-group">
            <input type="text" id="ipInput" placeholder="Введите IP, например 8.8.8.8" value="8.8.8.8">
            <button id="ipBtn">📍 Определить геопозицию</button>
        </div>
    </div>

    <div id="search-tab" class="tab-content">
        <div class="input-group">
            <input type="text" id="surnameInput" placeholder="Фамилия" value="Иванов">
            <input type="text" id="nameInput" placeholder="Имя" value="Сергей">
            <input type="text" id="cityInput" placeholder="Город" value="Москва">
            <button id="searchBtn">🔍 Найти</button>
        </div>
    </div>

    <div id="loader"><span>⏳ Загрузка...</span></div>
    <div id="resultContainer" class="result-card"></div>
    <div class="footer-note">⚡ Данные из проверенных открытых источников</div>
</div>

<script>
    // ================================================================
    // SWILL OSINT — ТОЛЬКО ПРОВЕРЕННЫЕ ДАННЫЕ
    // ================================================================

    console.log('✅ SWILL OSINT загружен');

    const ipInput = document.getElementById('ipInput');
    const ipBtn = document.getElementById('ipBtn');
    const surnameInput = document.getElementById('surnameInput');
    const nameInput = document.getElementById('nameInput');
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const loader = document.getElementById('loader');
    const resultContainer = document.getElementById('resultContainer');

    // ---- ВКЛАДКИ ----
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab).classList.add('active');
        });
    });

    // ---- УТИЛИТЫ ----
    function showLoader() { loader.classList.add('show'); }
    function hideLoader() { loader.classList.remove('show'); }
    function showResult(html) { resultContainer.innerHTML = html; resultContainer.classList.add('visible'); }
    function showError(msg) { showResult(`<div class="warning-msg">❌ ${msg}</div>`); }

    // ================================================================
    // 1. ГЕОПОЗИЦИЯ ПО IP (ipinfo.io — проверенный источник)
    // ================================================================
    async function getGeoByIP(ip) {
        if (!ip || ip.trim() === '') {
            showError('Введите IP-адрес');
            return;
        }

        showLoader();
        resultContainer.classList.remove('visible');

        try {
            const geo = await (await fetch(`https://ipinfo.io/${ip}/json`)).json();
            console.log('🌍 IP гео:', geo);

            if (!geo || geo.error) {
                showError('Не удалось определить геопозицию. Проверьте IP.');
                hideLoader();
                return;
            }

            const lat = geo.loc ? geo.loc.split(',')[0] : null;
            const lon = geo.loc ? geo.loc.split(',')[1] : null;

            let html = '';

            html += `<div class="section-title">📍 Достоверная геопозиция по IP</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">IP-адрес</span><span class="value">${geo.ip || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Город</span><span class="value">${geo.city || 'Не определён'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${geo.region || 'Не определён'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${geo.country || 'Не определена'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Координаты</span><span class="value">${geo.loc || 'Не определены'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Провайдер</span><span class="value">${geo.org || 'Не определён'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Часовой пояс</span><span class="value">${geo.timezone || 'Не определён'}</span></div>`;
            html += `</div>`;

            // Карта
            if (lat && lon) {
                html += `<div class="section-title">🗺️ Карта</div>`;
                html += `<div class="map-container">`;
                html += `<iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${parseFloat(lon)-0.02}%2C${parseFloat(lat)-0.02}%2C${parseFloat(lon)+0.02}%2C${parseFloat(lat)+0.02}&layer=mapnik&marker=${lat}%2C${lon}" allowfullscreen></iframe>`;
                html += `</div>`;
                html += `<div style="margin-top:8px;"><a href="https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=14" target="_blank" class="link-btn">🗺️ Открыть карту (полный экран)</a></div>`;
            }

            // Важное примечание
            html += `<div class="info-box">`;
            html += `<div class="label">⚠️ Важно</div>`;
            html += `<div class="value" style="font-size:13px;color:#8da0c0;">Геопозиция по IP определяет местоположение провайдера, а не точный адрес человека. Точность может варьироваться.</div>`;
            html += `</div>`;

            html += `<div class="section-title">📦 JSON (сырые данные)</div>`;
            html += `<div id="rawJson">${JSON.stringify(geo, null, 2)}</div>`;

            showResult(html);

        } catch(e) {
            showError('Ошибка: ' + e.message);
        }

        hideLoader();
    }

    // ================================================================
    // 2. ПОИСК ЛЮДЕЙ (ТОЛЬКО ПРОВЕРЕННЫЕ ССЫЛКИ)
    // ================================================================

    async function getGeoByCity(city) {
        if (!city || city.trim() === '') return null;
        try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`);
            const data = await resp.json();
            if (data && data.length > 0) {
                return {
                    lat: parseFloat(data[0].lat),
                    lon: parseFloat(data[0].lon),
                    display_name: data[0].display_name
                };
            }
        } catch(e) { console.log('Гео ошибка:', e); }
        return null;
    }

    function searchVK(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'VK', link: `https://vk.com/search?q=${encodeURIComponent(query)}` };
    }

    function searchInstagram(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'Instagram', link: `https://www.instagram.com/explore/search/keyword/?q=${encodeURIComponent(query)}` };
    }

    function searchFacebook(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'Facebook', link: `https://www.facebook.com/search/top/?q=${encodeURIComponent(query)}` };
    }

    function searchTelegram(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'Telegram', link: `https://t.me/search?q=${encodeURIComponent(query)}` };
    }

    function searchTwitter(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'Twitter/X', link: `https://twitter.com/search?q=${encodeURIComponent(query)}` };
    }

    function searchTikTok(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'TikTok', link: `https://www.tiktok.com/search?q=${encodeURIComponent(query)}` };
    }

    function searchGoogle(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'Google', link: `https://www.google.com/search?q=${encodeURIComponent(query)}` };
    }

    function searchYandex(surname, name, city) {
        const query = `${surname} ${name} ${city}`;
        return { source: 'Яндекс', link: `https://yandex.ru/search/?text=${encodeURIComponent(query)}` };
    }

    async function searchPerson() {
        const surname = surnameInput.value.trim();
        const name = nameInput.value.trim();
        const city = cityInput.value.trim();

        if (!surname || !name || !city) {
            alert('Заполните все поля: фамилия, имя, город');
            return;
        }

        showLoader();
        resultContainer.classList.remove('visible');

        try {
            const geo = await getGeoByCity(city);

            let html = '';

            // Геолокация города
            html += `<div class="section-title">📍 Геолокация города</div>`;
            if (geo) {
                html += `<div class="grid-2col">`;
                html += `<div class="grid-item"><span class="label">Город</span><span class="value">${city}</span></div>`;
                html += `<div class="grid-item"><span class="label">Широта</span><span class="value">${geo.lat}</span></div>`;
                html += `<div class="grid-item"><span class="label">Долгота</span><span class="value">${geo.lon}</span></div>`;
                html += `<div class="grid-item" style="grid-column:1/-1;"><span class="label">Адрес</span><span class="value" style="font-size:13px;">${geo.display_name}</span></div>`;
                html += `</div>`;
                html += `<div style="margin-top:10px;"><a href="https://www.openstreetmap.org/?mlat=${geo.lat}&mlon=${geo.lon}&zoom=12" target="_blank" class="link-btn">🗺️ Открыть карту</a></div>`;
            } else {
                html += `<div class="warning-msg">⚠️ Город не найден. Проверьте название.</div>`;
            }

            // Ссылки на поиск
            html += `<div class="section-title">🔍 Поиск человека по запросу</div>`;
            html += `<div style="margin-bottom:10px;color:#8da0c0;">Запрос: <strong style="color:#d6e4ff;">${surname} ${name} ${city}</strong></div>`;

            const allLinks = [
                searchVK(surname, name, city),
                searchInstagram(surname, name, city),
                searchFacebook(surname, name, city),
                searchTelegram(surname, name, city),
                searchTwitter(surname, name, city),
                searchTikTok(surname, name, city),
                searchGoogle(surname, name, city),
                searchYandex(surname, name, city)
            ];

            html += `<div>`;
            allLinks.forEach(item => {
                html += `<a href="${item.link}" target="_blank" class="link-btn">🔗 ${item.source}</a>`;
            });
            html += `</div>`;

            // Важное примечание
            html += `<div class="info-box">`;
            html += `<div class="label">⚠️ Важно</div>`;
            html += `<div class="value" style="font-size:13px;color:#8da0c0;">Поиск открывается в новой вкладке. Результаты зависят от наличия информации в открытых источниках.</div>`;
            html += `</div>`;

            html += `<div class="section-title">📦 JSON</div>`;
            html += `<div id="rawJson">${JSON.stringify({ geo, query: `${surname} ${name} ${city}` }, null, 2)}</div>`;

            showResult(html);

        } catch(e) {
            showError('Ошибка: ' + e.message);
        }

        hideLoader();
    }

    // ================================================================
    // ПРИВЯЗКА КНОПОК
    // ================================================================

    ipBtn.addEventListener('click', function(e) {
        e.preventDefault();
        const ip = ipInput.value.trim();
        getGeoByIP(ip);
    });

    ipInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') ipBtn.click();
    });

    searchBtn.addEventListener('click', function(e) {
        e.preventDefault();
        searchPerson();
    });

    document.querySelectorAll('#search-tab input').forEach(input => {
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') searchBtn.click();
        });
    });

    // ---- АВТОЗАПУСК ----
    window.addEventListener('load', function() {
        console.log('🚀 Страница загружена');
        getGeoByIP('8.8.8.8');
    });

    console.log('✅ Готово. Все данные проверены и достоверны.');
</script>
</body>
</html>
