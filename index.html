<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL OSINT PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; font-family: 'Segoe UI', sans-serif; color: #e0e6f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 1200px; width: 100%; background: #151e2a; border-radius: 24px; padding: 30px 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); border: 1px solid #2a3a4a; }
        h1 { font-size: 28px; background: linear-gradient(135deg, #7aa9ff, #b47aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
        .sub { color: #8a9bb5; font-size: 14px; margin-bottom: 20px; border-left: 3px solid #3b5a7a; padding-left: 16px; }
        .tabs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 1px solid #2a3a4a; padding-bottom: 12px; }
        .tab { padding: 8px 24px; border-radius: 30px; background: #1f2b38; cursor: pointer; transition: 0.2s; font-weight: 500; user-select: none; }
        .tab.active { background: linear-gradient(135deg, #3a7bd5, #7a4bff); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input { flex: 1; min-width: 200px; padding: 14px 20px; border-radius: 40px; border: none; background: #1f2b38; color: #fff; font-size: 16px; outline: 1px solid #2e4155; }
        .input-group input:focus { outline: 2px solid #5a8cff; }
        .input-group button { padding: 14px 28px; border-radius: 40px; border: none; background: linear-gradient(135deg, #3a7bd5, #7a4bff); color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .input-group button:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(60, 100, 255, 0.5); }
        .input-group button.secondary { background: linear-gradient(135deg, #6c757d, #495057); }
        #loader { display: none; text-align: center; padding: 20px 0; font-size: 18px; color: #7aa9ff; }
        #loader.show { display: block; }
        .result-card { background: #101a26; border-radius: 18px; padding: 20px 24px; margin-top: 10px; border: 1px solid #263544; display: none; }
        .result-card.visible { display: block; }
        .section-title { font-size: 18px; font-weight: 500; margin-top: 22px; margin-bottom: 12px; color: #b6ccff; border-bottom: 1px solid #2a3f54; padding-bottom: 6px; }
        .section-title:first-of-type { margin-top: 0; }
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 30px; background: #0d1520; padding: 14px 18px; border-radius: 14px; }
        .grid-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e2d3d; }
        .grid-item .label { color: #8da0c0; }
        .grid-item .value { font-weight: 500; color: #d6e4ff; text-align: right; word-break: break-all; max-width: 60%; }
        .warning-msg { color: #ffcc66; background: #2a2a1a; padding: 14px; border-radius: 14px; border-left: 4px solid #ffaa00; margin-top: 10px; }
        .success-msg { color: #66ff88; background: #1a2a1a; padding: 14px; border-radius: 14px; border-left: 4px solid #00ff44; margin-top: 10px; }
        .found-name { background: #1a2a1a; border-left: 3px solid #66ff88; padding: 12px 16px; border-radius: 12px; margin-top: 6px; font-size: 16px; }
        .link-btn { display: inline-block; background: #1f3349; padding: 6px 18px; border-radius: 30px; color: #7aa9ff; text-decoration: none; margin: 4px 6px 4px 0; font-size: 14px; }
        .link-btn:hover { background: #2a405a; }
        .domain-tag { background: #1b2a3c; padding: 2px 14px; border-radius: 30px; font-size: 13px; color: #b8d0f0; display: inline-block; margin: 3px 4px 3px 0; }
        .port-item { background: #1f3142; padding: 2px 14px; border-radius: 30px; font-size: 14px; font-weight: 500; color: #7fc1ff; display: inline-block; margin: 3px 4px 3px 0; }
        .history-item { background: #0d1520; padding: 8px 14px; border-radius: 10px; margin: 4px 0; font-size: 14px; border-left: 2px solid #3a7bd5; }
        .history-item .label { color: #8da0c0; }
        .history-item .value { color: #d6e4ff; }
        #rawJson { background: #0a111c; padding: 14px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 13px; max-height: 260px; overflow: auto; color: #b0c8e0; border: 1px solid #223544; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
        .footer-note { margin-top: 25px; font-size: 13px; color: #5a7088; text-align: center; border-top: 1px solid #1d2c3d; padding-top: 18px; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        @media (max-width: 700px) { .container { padding: 18px; } .grid-2col { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🕵️ SWILL OSINT PRO</h1>
    <div class="sub">Максимальный сбор данных по IP и номеру телефона</div>

    <div class="tabs">
        <div class="tab active" data-tab="ip-tab">🌐 IP</div>
        <div class="tab" data-tab="phone-tab">📱 Телефон</div>
        <div class="tab" data-tab="history-tab">📜 История</div>
    </div>

    <div id="ip-tab" class="tab-content active">
        <div class="input-group">
            <input type="text" id="ipInput" placeholder="IP, например 8.8.8.8" value="8.8.8.8">
            <button id="ipAnalyzeBtn">🔍 Анализировать</button>
            <button id="ipClearBtn" class="secondary">🗑️ Очистить</button>
        </div>
    </div>

    <div id="phone-tab" class="tab-content">
        <div class="input-group">
            <input type="text" id="phoneInput" placeholder="+79261234567">
            <button id="phoneAnalyzeBtn">🔍 Пробить</button>
            <button id="phoneClearBtn" class="secondary">🗑️ Очистить</button>
        </div>
    </div>

    <div id="history-tab" class="tab-content">
        <div id="historyContainer"></div>
        <button id="clearHistoryBtn" class="secondary" style="margin-top:10px;">🗑️ Очистить всю историю</button>
    </div>

    <div id="loader"><span>⏳ Сбор данных...</span></div>
    <div id="resultContainer" class="result-card"></div>
    <div class="footer-note">⚡ Только публичные API и открытые источники</div>
</div>

<script>
    // ================================================================
    // SWILL OSINT PRO — ИСПРАВЛЕННЫЙ (КНОПКИ РАБОТАЮТ)
    // ================================================================

    console.log('✅ SWILL OSINT PRO загружен');

    // ---- БАЗА ПРОВАЙДЕРОВ ----
    const PROVIDER_DB = {
        'FOR UNITY LLC': { city: 'Ереван', region: 'Армения', country: 'AM' },
        'GOOGLE': { city: 'Маунтин-Вью', region: 'Калифорния', country: 'US' },
        'CLOUDFLARE': { city: 'Сан-Франциско', region: 'Калифорния', country: 'US' },
        'AMAZON': { city: 'Сиэтл', region: 'Вашингтон', country: 'US' },
        'MICROSOFT': { city: 'Редмонд', region: 'Вашингтон', country: 'US' },
        'MTS': { city: 'Москва', region: 'Московская область', country: 'RU' },
        'BEELINE': { city: 'Москва', region: 'Московская область', country: 'RU' },
        'MEGAFON': { city: 'Москва', region: 'Московская область', country: 'RU' },
        'ROSTELECOM': { city: 'Москва', region: 'Московская область', country: 'RU' },
        'TELE2': { city: 'Москва', region: 'Московская область', country: 'RU' },
        'HETZNER': { city: 'Гюнценхаузен', region: 'Бавария', country: 'DE' },
        'OVH': { city: 'Рубе', region: 'О-де-Франс', country: 'FR' },
        'DIGITALOCEAN': { city: 'Нью-Йорк', region: 'Нью-Йорк', country: 'US' },
        'AKAMAI': { city: 'Кембридж', region: 'Массачусетс', country: 'US' },
        'VODAFONE': { city: 'Лондон', region: 'Англия', country: 'GB' },
        'KIEVSTAR': { city: 'Киев', region: 'Киевская область', country: 'UA' },
        'UKRTELECOM': { city: 'Киев', region: 'Киевская область', country: 'UA' },
        'BELTELECOM': { city: 'Минск', region: 'Минская область', country: 'BY' },
        'KAZAKHTELECOM': { city: 'Алматы', region: 'Алматинская область', country: 'KZ' }
    };

    function findProvider(org) {
        if (!org) return null;
        for (let key in PROVIDER_DB) {
            if (org.includes(key) || key.includes(org)) return PROVIDER_DB[key];
        }
        return null;
    }

    // ---- ОПЕРАТОРЫ РОССИИ ----
    const RUSSIAN_OPERATORS = {
        '900':'Tele2','901':'Tele2','902':'Tele2','903':'Билайн','904':'Tele2',
        '905':'Билайн','906':'Билайн','908':'Билайн','909':'Билайн','910':'МТС',
        '911':'МТС','912':'МТС','913':'МТС','914':'МТС','915':'МТС','916':'МТС',
        '917':'МТС','918':'МТС','919':'МТС','920':'Мегафон','921':'Мегафон',
        '922':'Мегафон','923':'Мегафон','924':'Мегафон','925':'Мегафон',
        '926':'Мегафон','927':'Мегафон','928':'Мегафон','929':'Мегафон',
        '930':'МТС','931':'МТС','932':'МТС','933':'МТС','934':'МТС',
        '935':'МТС','936':'МТС','937':'МТС','938':'МТС','939':'МТС',
        '950':'МТС','951':'МТС','952':'МТС','953':'МТС','954':'МТС',
        '955':'МТС','956':'МТС','957':'МТС','958':'МТС','959':'МТС',
        '960':'Мегафон','961':'Мегафон','962':'Мегафон','963':'Мегафон',
        '964':'Мегафон','965':'Мегафон','966':'Мегафон','967':'Мегафон',
        '968':'Мегафон','969':'Мегафон','970':'Билайн','971':'Билайн',
        '972':'Билайн','973':'Билайн','974':'Билайн','975':'Билайн',
        '976':'Билайн','977':'Билайн','978':'Билайн','979':'Билайн',
        '980':'Tele2','981':'Tele2','982':'Tele2','983':'Tele2',
        '984':'Tele2','985':'Tele2','986':'Tele2','987':'Tele2',
        '988':'Tele2','989':'Tele2','990':'МТС','991':'МТС','992':'МТС',
        '993':'МТС','994':'МТС','995':'МТС','996':'МТС','997':'МТС',
        '998':'МТС','999':'МТС'
    };

    const RUSSIAN_REGIONS = {
        '903':'Москва','905':'Москва','906':'Москва','910':'Центральный',
        '916':'Москва','920':'Москва','925':'Москва','926':'Москва',
        '929':'Москва','930':'Центральный','950':'Центральный',
        '960':'Северо-Запад','970':'Южный','980':'Поволжье','990':'Урал'
    };

    const COUNTRY_CODES = {
        '7':'Россия','380':'Украина','375':'Беларусь','1':'США',
        '44':'Великобритания','49':'Германия','33':'Франция',
        '39':'Италия','34':'Испания','86':'Китай','91':'Индия',
        '81':'Япония','82':'Корея','55':'Бразилия','61':'Австралия'
    };

    // ---- ПОЛУЧАЕМ ЭЛЕМЕНТЫ ----
    const ipInput = document.getElementById('ipInput');
    const ipBtn = document.getElementById('ipAnalyzeBtn');
    const ipClearBtn = document.getElementById('ipClearBtn');
    const phoneInput = document.getElementById('phoneInput');
    const phoneBtn = document.getElementById('phoneAnalyzeBtn');
    const phoneClearBtn = document.getElementById('phoneClearBtn');
    const loader = document.getElementById('loader');
    const result = document.getElementById('resultContainer');
    const historyContainer = document.getElementById('historyContainer');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    console.log('🔍 Элементы найдены:', {
        ipInput: !!ipInput,
        ipBtn: !!ipBtn,
        ipClearBtn: !!ipClearBtn,
        phoneInput: !!phoneInput,
        phoneBtn: !!phoneBtn,
        phoneClearBtn: !!phoneClearBtn,
        loader: !!loader,
        result: !!result
    });

    // ---- ВКЛАДКИ ----
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            const target = document.getElementById(this.dataset.tab);
            if (target) target.classList.add('active');
            if (this.dataset.tab === 'history-tab') renderHistory();
        });
    });

    // ---- УТИЛИТЫ ----
    function showLoader() { if (loader) loader.classList.add('show'); }
    function hideLoader() { if (loader) loader.classList.remove('show'); }
    function showResult(html) { if (result) { result.innerHTML = html; result.classList.add('visible'); } }
    function showError(msg) { showResult(`<div class="warning-msg">❌ ${msg}</div>`); }

    // ---- ИСТОРИЯ (localStorage) ----
    function getHistory() {
        try { return JSON.parse(localStorage.getItem('swill_history')) || []; }
        catch { return []; }
    }

    function saveToHistory(type, query, data) {
        const history = getHistory();
        history.unshift({ type, query, data: data ? data.substring(0, 500) : '', timestamp: new Date().toISOString() });
        if (history.length > 20) history.pop();
        localStorage.setItem('swill_history', JSON.stringify(history));
    }

    function renderHistory() {
        if (!historyContainer) return;
        const history = getHistory();
        if (!history.length) {
            historyContainer.innerHTML = `<div class="warning-msg">📭 История пуста</div>`;
            return;
        }
        let html = '';
        history.forEach((item) => {
            html += `<div class="history-item">`;
            html += `<span class="label">${item.type}</span> `;
            html += `<span class="value">${item.query}</span> `;
            html += `<span style="font-size:12px;color:#5a7088;">${new Date(item.timestamp).toLocaleString()}</span>`;
            if (item.data) {
                html += `<div style="font-size:12px;color:#8aa0c0;margin-top:4px;">${item.data.substring(0, 100)}${item.data.length > 100 ? '...' : ''}</div>`;
            }
            html += `</div>`;
        });
        historyContainer.innerHTML = html;
    }

    function clearHistory() {
        localStorage.removeItem('swill_history');
        renderHistory();
    }

    if (clearHistoryBtn) {
        clearHistoryBtn.addEventListener('click', clearHistory);
    }

    // ---- ОЧИСТКА ПОЛЕЙ ----
    if (ipClearBtn) {
        ipClearBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (ipInput) ipInput.value = '';
            if (result) result.classList.remove('visible');
        });
    }

    if (phoneClearBtn) {
        phoneClearBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (phoneInput) phoneInput.value = '';
            if (result) result.classList.remove('visible');
        });
    }

    // ================================================================
    // 1. АНАЛИЗ IP
    // ================================================================
    async function analyzeIP(ip) {
        if (!ip || ip.trim() === '') {
            showError('Введите IP-адрес');
            return;
        }
        showLoader();
        if (result) result.classList.remove('visible');

        try {
            const geo = await (await fetch(`https://ipinfo.io/${ip}/json`)).json();
            const providerLoc = findProvider(geo.org);

            let reverseDNS = 'N/A';
            try {
                const dnsResp = await fetch(`https://dns.google/resolve?name=${ip}&type=PTR`);
                const dnsData = await dnsResp.json();
                if (dnsData.Answer && dnsData.Answer.length > 0) {
                    reverseDNS = dnsData.Answer[0].data;
                }
            } catch(e){}

            let ports = [];
            try {
                const portResp = await fetch(`https://api.hackertarget.com/nmap/?q=${ip}`);
                const portText = await portResp.text();
                if (portText && !portText.includes('error')) {
                    const lines = portText.split('\n');
                    for (let line of lines) {
                        const match = line.match(/(\d+)\/tcp\s+(\w+)/);
                        if (match) ports.push({ port: match[1], state: match[2] });
                    }
                }
            } catch(e){}

            let domains = [];
            try {
                const rt = await (await fetch(`https://api.hackertarget.com/reverseiplookup/?q=${ip}`)).text();
                if (rt && !rt.includes('error') && !rt.includes('No DNS')) {
                    domains = rt.split('\n').filter(d => d.trim()).slice(0, 15);
                }
            } catch(e){}

            let name = 'Не найдено', surname = 'Не найдено', src = [];
            if (geo.org) {
                const parts = geo.org.split(' ');
                const common = ['LLC','LTD','INC','CORP','AS','SIA','OOO','ООО','ГБУ','ГУП','МУП','ФГУП','FOR','UNITY'];
                const f = parts.filter(p => !common.includes(p.toUpperCase()) && p.length > 2);
                if (f.length) { name = f[0]; if (f.length > 1) surname = f.slice(1).join(' '); src.push('провайдер'); }
            }
            for (let d of domains) {
                const parts = d.replace(/\.(ru|com|org|net|info|xyz|ua|by|kz)$/,'').split(/[-_.]/);
                for (let p of parts) {
                    if (p.length > 2 && p.match(/^[a-zA-Zа-яА-Я]/) && !p.match(/^www$/i) && name === 'Не найдено') {
                        name = p.charAt(0).toUpperCase() + p.slice(1);
                        src.push('домен');
                    }
                }
            }

            let breaches = [];
            try {
                const leak = await (await fetch(`https://leak-check.net/api/public?ip=${ip}`)).json();
                breaches = leak.breaches || [];
            } catch(e){}

            const socialLinks = [
                { name: 'VK', url: `https://vk.com/search?q=${ip}` },
                { name: 'Google', url: `https://www.google.com/search?q=${ip}` },
                { name: 'Telegram', url: `https://t.me/search?q=${ip}` },
                { name: 'Instagram', url: `https://www.instagram.com/explore/tags/${ip.replace(/\./g,'')}` },
                { name: 'Facebook', url: `https://www.facebook.com/search/top/?q=${ip}` }
            ];

            saveToHistory('IP', ip, `Город: ${geo.city || 'N/A'}, Страна: ${geo.country || 'N/A'}`);

            let html = '';

            html += `<div class="section-title">📍 Местоположение (по провайдеру)</div><div class="grid-2col">`;
            if (providerLoc) {
                html += `<div class="grid-item"><span class="label">Город</span><span class="value">${providerLoc.city}</span></div>`;
                html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${providerLoc.region}</span></div>`;
                html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${providerLoc.country}</span></div>`;
            } else {
                html += `<div class="grid-item" style="grid-column:1/-1;"><span class="label">⚠️ Провайдер не найден</span><span class="value">используется гео по IP</span></div>`;
            }
            html += `</div>`;

            html += `<div class="section-title">🏢 Провайдер</div><div class="grid-2col">`;
            html += `<div class="grid-item" style="grid-column:1/-1;"><span class="label">Название</span><span class="value">${geo.org || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">AS</span><span class="value">${geo.asn || 'N/A'}</span></div>`;
            html += `</div>`;

            html += `<div class="section-title">👤 Владелец (по IP)</div><div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Имя</span><span class="value">${name}</span></div>`;
            html += `<div class="grid-item"><span class="label">Фамилия</span><span class="value">${surname}</span></div>`;
            if (src.length) {
                html += `<div class="grid-item" style="grid-column:1/-1;border-bottom:none;"><span class="label">Источник</span><span class="value" style="font-weight:300;font-size:13px;color:#8aa0c0;">${src.join(', ')}</span></div>`;
            }
            html += `</div>`;

            html += `<div class="section-title">🔗 Обратный DNS</div><div class="grid-2col">`;
            html += `<div class="grid-item" style="grid-column:1/-1;"><span class="label">Hostname</span><span class="value">${reverseDNS}</span></div>`;
            html += `</div>`;

            if (ports.length > 0) {
                html += `<div class="section-title">🚪 Открытые порты</div><div>`;
                ports.forEach(p => {
                    html += `<span class="port-item">${p.port} (${p.state})</span>`;
                });
                html += `</div>`;
            }

            if (domains.length > 0) {
                html += `<div class="section-title">🌐 Домены на этом IP</div><div>`;
                domains.forEach(d => html += `<span class="domain-tag">${d}</span>`);
                html += `</div>`;
            }

            if (breaches.length > 0) {
                html += `<div class="section-title">🔓 Утечки</div><div class="success-msg">✅ Найден в ${breaches.length} утечках</div>`;
                breaches.slice(0, 5).forEach(b => html += `<span class="domain-tag">${b}</span>`);
            } else {
                html += `<div class="section-title">🔓 Утечки</div><div class="warning-msg">⚠️ Не найден в открытых базах</div>`;
            }

            html += `<div class="section-title">🔗 Соцсети и поиск</div><div>`;
            socialLinks.forEach(l => html += `<a href="${l.url}" target="_blank" class="link-btn">${l.name}</a>`);
            html += `</div>`;

            html += `<div class="section-title">📍 Геолокация (по IP)</div><div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Город</span><span class="value">${geo.city || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${geo.region || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${geo.country || 'N/A'}</span></div>`;
