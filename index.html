<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWILL Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #151e2a;
            border-radius: 24px;
            padding: 30px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 1px solid #2a3a4a;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #7aa9ff, #b47aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a3a4a;
            padding-bottom: 12px;
        }
        .tab {
            padding: 8px 24px;
            border-radius: 30px;
            background: #1f2b38;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .tab.active {
            background: linear-gradient(135deg, #3a7bd5, #7a4bff);
            color: white;
        }
        .tab:hover {
            transform: scale(1.02);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .sub {
            color: #8a9bb5;
            font-size: 14px;
            margin-bottom: 25px;
            border-left: 3px solid #3b5a7a;
            padding-left: 16px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .input-group input {
            flex: 1;
            min-width: 220px;
            padding: 14px 20px;
            border-radius: 40px;
            border: none;
            background: #1f2b38;
            color: #fff;
            font-size: 16px;
            outline: 1px solid #2e4155;
        }
        .input-group input:focus {
            outline: 2px solid #5a8cff;
        }
        .input-group button {
            padding: 14px 38px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #3a7bd5, #7a4bff);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-group button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(60, 100, 255, 0.5);
        }
        #loader {
            display: none;
            text-align: center;
            padding: 20px 0;
            font-size: 18px;
            color: #7aa9ff;
        }
        #loader.show {
            display: block;
        }
        .result-card {
            background: #101a26;
            border-radius: 18px;
            padding: 20px 24px;
            margin-top: 10px;
            border: 1px solid #263544;
            display: none;
        }
        .result-card.visible {
            display: block;
        }
        .section-title {
            font-size: 18px;
            font-weight: 500;
            margin-top: 22px;
            margin-bottom: 12px;
            color: #b6ccff;
            border-bottom: 1px solid #2a3f54;
            padding-bottom: 6px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            background: #0d1520;
            padding: 14px 18px;
            border-radius: 14px;
        }
        .grid-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1e2d3d;
        }
        .grid-item .label {
            color: #8da0c0;
        }
        .grid-item .value {
            font-weight: 500;
            color: #d6e4ff;
            text-align: right;
            word-break: break-all;
            max-width: 60%;
        }
        .error-msg {
            color: #ff7a7a;
            background: #2a1a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #ff4a4a;
        }
        .warning-msg {
            color: #ffcc66;
            background: #2a2a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #ffaa00;
            margin-top: 10px;
        }
        .success-msg {
            color: #66ff88;
            background: #1a2a1a;
            padding: 14px;
            border-radius: 14px;
            border-left: 4px solid #00ff44;
            margin-top: 10px;
        }
        .domain-tag {
            background: #1b2a3c;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #b8d0f0;
            display: inline-block;
            margin: 3px 4px 3px 0;
        }
        #rawJson {
            background: #0a111c;
            padding: 14px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 260px;
            overflow: auto;
            color: #b0c8e0;
            border: 1px solid #223544;
            margin-top: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 13px;
            color: #5a7088;
            text-align: center;
            border-top: 1px solid #1d2c3d;
            padding-top: 18px;
        }
        @media (max-width: 700px) {
            .container { padding: 18px; }
            .grid-2col { grid-template-columns: 1fr; }
            .input-group input { min-width: 140px; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🕵️ SWILL Intelligence</h1>
    <div class="sub">Поиск данных по IP и номеру телефона: геолокация, владелец, имя, фамилия</div>

    <!-- Вкладки -->
    <div class="tabs">
        <div class="tab active" data-tab="ip-tab">🌐 IP-адрес</div>
        <div class="tab" data-tab="phone-tab">📱 Телефон</div>
    </div>

    <!-- Вкладка IP -->
    <div id="ip-tab" class="tab-content active">
        <div class="input-group">
            <input type="text" id="ipInput" placeholder="Введите IP, например 8.8.8.8" value="8.8.8.8">
            <button id="ipAnalyzeBtn">🔍 Анализировать IP</button>
        </div>
    </div>

    <!-- Вкладка Телефон -->
    <div id="phone-tab" class="tab-content">
        <div class="input-group">
            <input type="text" id="phoneInput" placeholder="Введите номер, например +79261234567">
            <button id="phoneAnalyzeBtn">🔍 Пробить номер</button>
        </div>
    </div>

    <div id="loader"><span>⏳ Сбор данных...</span></div>
    <div id="resultContainer" class="result-card"></div>

    <div class="footer-note">
        ⚡ Данные из публичных API и OSINT-источников
    </div>
</div>

<script>
    // ================================================================
    // ПОЛНЫЙ ИНСТРУМЕНТ — IP + ТЕЛЕФОН
    // ================================================================

    console.log('✅ SWILL Intelligence загружен!');

    // ---- ЭЛЕМЕНТЫ ----
    const ipInput = document.getElementById('ipInput');
    const ipAnalyzeBtn = document.getElementById('ipAnalyzeBtn');
    const phoneInput = document.getElementById('phoneInput');
    const phoneAnalyzeBtn = document.getElementById('phoneAnalyzeBtn');
    const loader = document.getElementById('loader');
    const resultContainer = document.getElementById('resultContainer');

    // ---- ВКЛАДКИ ----
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab).classList.add('active');
        });
    });

    // ---- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----
    function showLoader() { loader.classList.add('show'); }
    function hideLoader() { loader.classList.remove('show'); }
    function showResult(html) {
        resultContainer.innerHTML = html;
        resultContainer.classList.add('visible');
    }
    function showError(message) {
        showResult(`<div class="error-msg">❌ ${message}</div>`);
    }

    // ---- ОБХОД CORS ЧЕРЕЗ ПРОКСИ ----
    async function fetchWithProxy(url) {
        // Используем несколько прокси-сервисов для обхода CORS
        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            `https://corsproxy.io/?${encodeURIComponent(url)}`,
            `https://cors-anywhere.herokuapp.com/${url}`
        ];

        for (let proxy of proxies) {
            try {
                console.log(`🔄 Пробуем прокси: ${proxy}`);
                const response = await fetch(proxy, {
                    headers: { 'Origin': window.location.origin }
                });
                if (response.ok) {
                    return await response.text();
                }
            } catch (e) {
                console.log(`❌ Прокси не сработал: ${proxy}`);
            }
        }
        throw new Error('Все прокси недоступны');
    }

    // ---- ПОИСК ИМЕНИ И ФАМИЛИИ ПО IP ----
    async function findNameByIP(ip) {
        console.log('🔍 Ищем имя и фамилию по IP:', ip);

        let nameData = {
            name: 'Не найдено',
            surname: 'Не найдено',
            email: 'Не найдено',
            social: []
        };

        try {
            // 1. Пытаемся найти через whois (может содержать имя владельца)
            try {
                const whoisData = await fetchWithProxy(`https://ipwhois.app/json/${ip}`);
                const data = JSON.parse(whoisData);
                if (data.org && data.org.includes(' ')) {
                    const parts = data.org.split(' ');
                    if (parts.length > 1) {
                        nameData.name = parts[0];
                        nameData.surname = parts.slice(1).join(' ');
                    }
                }
                console.log('📡 Whois данные:', data);
            } catch (e) {}

            // 2. Поиск через reverse IP (домены, привязанные к IP)
            try {
                const domData = await fetchWithProxy(`https://api.hackertarget.com/reverseiplookup/?q=${ip}`);
                const domains = domData.split('\n').filter(d => d.trim() !== '').slice(0, 10);
                nameData.domains = domains;

                // Из доменов можно извлечь возможные имена
                for (let domain of domains) {
                    const parts = domain.replace(/\.(ru|com|org|net|info|xyz)$/, '').split(/[-_.]/);
                    for (let part of parts) {
                        if (part.length > 3 && part.match(/^[a-zA-Zа-яА-Я]/)) {
                            if (!nameData.name || nameData.name === 'Не найдено') {
                                nameData.name = part;
                            }
                        }
                    }
                }
                console.log('🌐 Домены:', domains);
            } catch (e) {}

            // 3. Поиск в открытых базах (через leak-check)
            try {
                const leakData = await fetchWithProxy(`https://leak-check.net/api/public?ip=${ip}`);
                const data = JSON.parse(leakData);
                if (data.breaches && data.breaches.length > 0) {
                    nameData.leaks = data.breaches;
                    for (let breach of data.breaches) {
                        if (breach.name) {
                            const parts = breach.name.split(' ');
                            if (parts.length > 1) {
                                nameData.name = parts[0];
                                nameData.surname = parts.slice(1).join(' ');
                            }
                        }
                    }
                }
                console.log('🔓 Leak данные:', data);
            } catch (e) {}

            // 4. Поиск через Google Dorks (имитация — через публичный API)
            try {
                // Используем абстрактный поиск
                const searchUrl = `https://api.duckduckgo.com/?q=${ip}&format=json`;
                const searchData = await fetchWithProxy(searchUrl);
                const data = JSON.parse(searchData);
                if (data.AbstractText) {
                    const text = data.AbstractText;
                    // Пытаемся найти имя
                    const nameMatch = text.match(/([А-Я][а-я]+)\s+([А-Я][а-я]+)/);
                    if (nameMatch) {
                        nameData.name = nameMatch[1];
                        nameData.surname = nameMatch[2];
                    }
                }
                console.log('🔍 DuckDuckGo данные:', data);
            } catch (e) {}

        } catch (error) {
            console.log('⚠️ Ошибка при поиске имени:', error);
        }

        return nameData;
    }

    // ---- АНАЛИЗ IP ----
    async function analyzeIP(ip) {
        console.log('🔍 Начинаем анализ IP:', ip);
        showLoader();
        resultContainer.classList.remove('visible');

        try {
            // 1. Получаем геоданные
            const geoResponse = await fetch(`https://ipinfo.io/${ip}/json`);
            if (!geoResponse.ok) throw new Error('Не удалось получить геоданные');
            const geoData = await geoResponse.json();
            console.log('🌍 Геоданные:', geoData);

            // 2. Ищем имя и фамилию
            const nameData = await findNameByIP(ip);
            console.log('👤 Данные о владельце:', nameData);

            // 3. Формируем результат
            let html = '';

            // Владелец
            html += `<div class="section-title">👤 Владелец (по IP)</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Имя</span><span class="value">${nameData.name || 'Не найдено'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Фамилия</span><span class="value">${nameData.surname || 'Не найдено'}</span></div>`;
            if (nameData.email) {
                html += `<div class="grid-item"><span class="label">Email</span><span class="value">${nameData.email}</span></div>`;
            }
            html += `</div>`;

            // Домены
            if (nameData.domains && nameData.domains.length > 0) {
                html += `<div class="section-title">🌐 Домены на этом IP</div>`;
                html += `<div>`;
                nameData.domains.slice(0, 10).forEach(d => {
                    html += `<span class="domain-tag">${d}</span>`;
                });
                html += `</div>`;
            }

            // Геолокация
            html += `<div class="section-title">📍 Геолокация</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Город</span><span class="value">${geoData.city || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Регион</span><span class="value">${geoData.region || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${geoData.country || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Провайдер</span><span class="value">${geoData.org || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Координаты</span><span class="value">${geoData.loc || 'N/A'}</span></div>`;
            html += `<div class="grid-item"><span class="label">Часовой пояс</span><span class="value">${geoData.timezone || 'N/A'}</span></div>`;
            html += `</div>`;

            // Утечки
            if (nameData.leaks && nameData.leaks.length > 0) {
                html += `<div class="section-title">🔓 Найден в утечках</div>`;
                html += `<div class="success-msg">✅ Найден в ${nameData.leaks.length} базах</div>`;
            } else {
                html += `<div class="section-title">🔓 Утечки</div>`;
                html += `<div class="warning-msg">⚠️ Не найден в открытых базах утечек</div>`;
            }

            // Сырые данные
            html += `<div class="section-title">📦 Сырые данные (JSON)</div>`;
            html += `<div id="rawJson">${JSON.stringify({ geo: geoData, name: nameData }, null, 2)}</div>`;

            showResult(html);

        } catch (error) {
            showError(`Ошибка: ${error.message}`);
        } finally {
            hideLoader();
        }
    }

    // ---- АНАЛИЗ ТЕЛЕФОНА ----
    async function analyzePhone(phone) {
        console.log('🔍 Начинаем анализ номера:', phone);
        showLoader();
        resultContainer.classList.remove('visible');

        const cleanNumber = phone.replace(/[^0-9+]/g, '').trim();
        if (!cleanNumber) {
            showError('Введите номер телефона');
            hideLoader();
            return;
        }

        try {
            // 1. Определяем страну и оператора
            let country = 'Неизвестно';
            let operator = 'Неизвестно';

            if (cleanNumber.startsWith('+7') || cleanNumber.startsWith('8') || cleanNumber.startsWith('7')) {
                country = 'Россия';
                // Определяем оператора по префиксу
                const prefix = cleanNumber.replace(/^\+7/, '').replace(/^8/, '').substring(0, 3);
                const operators = {
                    '900': 'Tele2', '901': 'Tele2', '902': 'Tele2', '903': 'Билайн', '904': 'Tele2',
                    '905': 'Билайн', '906': 'Билайн', '908': 'Билайн', '909': 'Билайн', '910': 'МТС',
                    '911': 'МТС', '912': 'МТС', '913': 'МТС', '914': 'МТС', '915': 'МТС',
                    '916': 'МТС', '917': 'МТС', '918': 'МТС', '919': 'МТС', '920': 'Мегафон',
                    '921': 'Мегафон', '922': 'Мегафон', '923': 'Мегафон', '924': 'Мегафон',
                    '925': 'Мегафон', '926': 'Мегафон', '927': 'Мегафон', '928': 'Мегафон',
                    '929': 'Мегафон', '930': 'МТС', '950': 'МТС', '951': 'МТС', '952': 'МТС',
                    '960': 'Мегафон', '961': 'Мегафон', '962': 'Мегафон', '970': 'Билайн',
                    '971': 'Билайн', '972': 'Билайн', '980': 'Tele2', '981': 'Tele2', '982': 'Tele2'
                };
                operator = operators[prefix] || 'Неизвестно';
            }

            // 2. Поиск в утечках через прокси
            let breaches = [];
            try {
                const leakData = await fetchWithProxy(`https://leak-check.net/api/public?phone=${cleanNumber}`);
                const data = JSON.parse(leakData);
                breaches = data.breaches || [];
                console.log('🔓 Найдено утечек:', breaches.length);
            } catch (e) {
                console.log('ℹ️ LeakCheck не доступен');
            }

            // 3. Поиск в соцсетях (имитация)
            const socialLinks = [];
            const socialNetworks = ['vk.com', 'facebook.com', 'instagram.com', 'telegram.org', 'whatsapp.com'];
            for (let net of socialNetworks) {
                socialLinks.push(`https://${net}/search?q=${cleanNumber}`);
            }

            // 4. Формируем результат
            let html = '';

            html += `<div class="section-title">📋 Основная информация</div>`;
            html += `<div class="grid-2col">`;
            html += `<div class="grid-item"><span class="label">Номер</span><span class="value">${cleanNumber}</span></div>`;
            html += `<div class="grid-item"><span class="label">Страна</span><span class="value">${country}</span></div>`;
            html += `<div class="grid-item"><span class="label">Оператор</span><span class="value">${operator}</span></div>`;
            html += `</div>`;

            html += `<div class="section-title">👤 Владелец</div>`;
            html += `<div class="warning-msg">ℹ️ Для получения имени и фамилии владельца номера требуются платные API (numverify.com, abstractapi.com).<br>Бесплатно можно проверить утечки и оператора.</div>`;

            if (breaches.length > 0) {
                html += `<div class="section-title">🔓 Утечки</div>`;
                html += `<div class="success-msg">✅ Найден в ${breaches.length} утечках</div>`;
                html += `<div>`;
                breaches.slice(0, 10).forEach(b => {
                    html += `<span class="domain-tag">${b}</span>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="section-title">🔓 Утечки</div>`;
                html += `<div class="warning-msg">⚠️ Не найден в открытых базах утечек</div>`;
            }

            html += `<div class="section-title">🔗 Поиск в соцсетях</div>`;
            html += `<div>`;
            socialLinks.forEach(link => {
                html += `<a href="${link}" target="_blank" style="color:#7aa9ff;margin-right:12px;">${link}</a><br>`;
            });
            html += `</div>`;

            html += `<div class="section-title">📦 Сырые данные</div>`;
            html += `<div id="rawJson">${JSON.stringify({ number: cleanNumber, country, operator, breaches }, null, 2)}</div>`;

            showResult(html);

        } catch (error) {
            showError(`Ошибка: ${error.message}`);
        } finally {
            hideLoader();
        }
    }

    // ---- ОБРАБОТЧИКИ ----
    ipAnalyzeBtn.addEventListener('click', () => {
        const ip = ipInput.value.trim();
        if (!ip) { alert('Введите IP-адрес'); return; }
        analyzeIP(ip);
    });

    ipInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') ipAnalyzeBtn.click();
    });

    phoneAnalyzeBtn.addEventListener('click', () => {
        const phone = phoneInput.value.trim();
        if (!phone) { alert('Введите номер телефона'); return; }
        analyzePhone(phone);
    });

    phoneInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') phoneAnalyzeBtn.click();
    });

    // ---- АВТОЗАПУСК ----
    window.addEventListener('load', () => {
        console.log('🚀 Страница загружена');
        analyzeIP('8.8.8.8');
    });

    console.log('✅ Готово!');
</script>

</body>
</html>
